# Postgres local para desarrollo (login NextAuth + Prisma).
# Uso: npm run docker:up
# DATABASE_URL en .env (ver .env.example).

services:
  postgres:
    image: postgres:16-alpine
    container_name: monoambiente-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: monoambiente
      POSTGRES_PASSWORD: monoambiente_dev
      POSTGRES_DB: monoambiente
    volumes:
      - monoambiente_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monoambiente -d monoambiente"]
      interval: 3s
      timeout: 5s
      retries: 15

volumes:
  monoambiente_pgdata:

# Postgres local para desarrollo (login NextAuth + Prisma).
# Uso: npm run docker:up
# DATABASE_URL en .env (ver .env.example).

services:
  postgres:
    image: postgres:16-alpine
    container_name: inmo-joven-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: inmo_joven
      POSTGRES_PASSWORD: inmo_joven_dev
      POSTGRES_DB: inmo_joven
    volumes:
      - inmo_joven_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inmo_joven -d inmo_joven"]
      interval: 3s
      timeout: 5s
      retries: 15

volumes:
  inmo_joven_pgdata:
